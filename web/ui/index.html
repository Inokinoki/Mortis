<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mortis - Personal AI Gateway</title>
	<style>
		* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
		}

	body {
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
		background: #0d1117;
		color: #e6edf3;
		line-height: 1.6;
		}

	.container {
		max-width: 1200px;
		margin: 0 auto;
		padding: 20px;
		}

	.header {
		display: flex;
		justify-content: space-between;
		align-items: center;
		padding: 20px 0;
		border-bottom: 1px solid #21262d;
		margin-bottom: 20px;
		}

	.logo {
		font-size: 24px;
		font-weight: bold;
		display: flex;
		align-items: center;
		gap: 10px;
		}

	.logo-emoji {
		font-size: 32px;
		}

	.status {
		display: flex;
		align-items: center;
		gap: 20px;
		font-size: 14px;
		}

	.status-item {
		display: flex;
		align-items: center;
		gap: 5px;
		}

	.status-dot {
		width: 8px;
		height: 8px;
		border-radius: 50%;
		}

	.status-dot.connected {
		background: #22c55e;
		}

	.status-dot.disconnected {
		background: #ef4444;
		}

	.main {
		display: grid;
		grid-template-columns: 300px 1fr;
		gap: 20px;
		height: calc(100vh - 120px);
		}

	.sidebar {
		background: #161b22;
		border-radius: 8px;
		padding: 15px;
		overflow-y: auto;
		}

	.sidebar-section {
		margin-bottom: 20px;
		}

	.sidebar-title {
		font-size: 12px;
		font-weight: 600;
		text-transform: uppercase;
		letter-spacing: 0.5px;
		color: #94a3b8;
		margin-bottom: 10px;
		}

	.sidebar-item {
		padding: 10px;
		border-radius: 6px;
		cursor: pointer;
		transition: background 0.2s;
		font-size: 14px;
		}

	.sidebar-item:hover {
		background: #1e293b;
		}

	.sidebar-item.active {
		background: #21262d;
		}

	.chat-container {
		display: flex;
		flex-direction: column;
		background: #161b22;
		border-radius: 8px;
		overflow: hidden;
		}

	.messages {
		flex: 1;
		overflow-y: auto;
		padding: 20px;
		}

	.message {
		margin-bottom: 20px;
		}

	.message-header {
		display: flex;
		align-items: center;
		gap: 10px;
		margin-bottom: 5px;
		}

	.message-role {
		font-size: 12px;
		font-weight: 600;
		text-transform: uppercase;
		}

	.message-role.user {
		color: #60a5fa;
		}

	.message-role.assistant {
		color: #22c55e;
		}

	.message-role.system {
		color: #f59e0b;
		}

	.message-content {
		font-size: 15px;
		line-height: 1.6;
		white-space: pre-wrap;
		word-wrap: break-word;
		}

	.input-container {
		padding: 20px;
		border-top: 1px solid #21262d;
		}

	.input-wrapper {
		display: flex;
		gap: 10px;
		align-items: flex-end;
		}

	textarea {
		flex: 1;
		background: #0d1117;
		border: 1px solid #21262d;
		border-radius: 8px;
		color: #e6edf3;
		padding: 12px;
		font-size: 15px;
		font-family: inherit;
		resize: none;
		min-height: 44px;
		max-height: 200px;
		}

	textarea:focus {
		outline: none;
		border-color: #3b82f6;
		}

	button.send-button {
		background: #3b82f6;
		color: white;
		border: none;
		border-radius: 8px;
		padding: 12px 20px;
		font-size: 14px;
		font-weight: 600;
		cursor: pointer;
		transition: background 0.2s;
		min-width: 80px;
		}

	button.send-button:hover {
		background: #2563eb;
		}

	button.send-button:disabled {
		background: #21262d;
		cursor: not-allowed;
		opacity: 0.5;
		}

	.thinking {
		display: flex;
		align-items: center;
		gap: 8px;
		padding: 10px;
		background: #0d1117;
		border-radius: 6px;
		font-size: 14px;
		color: #94a3b8;
		}

	.thinking-dot {
		width: 6px;
		height: 6px;
		background: #3b82f6;
		border-radius: 50%;
		animation: pulse 1.5s ease-in-out infinite;
		}

	@keyframes pulse {
		0%, 100% { opacity: 0.3; }
		50% { opacity: 1; }
		}

	.empty-state {
		text-align: center;
		padding: 60px 20px;
		color: #94a3b8;
		}

	.empty-icon {
		font-size: 48px;
		margin-bottom: 15px;
		}

	.empty-title {
		font-size: 18px;
		font-weight: 600;
		margin-bottom: 10px;
		}

	.empty-description {
		font-size: 14px;
		color: #94a3b8;
		}
	</style>
</head>
<body>
	<div class="container">
		<header class="header">
			<div class="logo">
			<span class="logo-emoji">🤖</span>
			<span>Mortis</span>
			</div>
			<div class="status">
			<div class="status-item">
				<div class="status-dot" id="connection-status"></div>
				<span id="connection-text">Connecting...</span>
			</div>
			<div class="status-item">
				<span id="provider-info">OpenAI: gpt-4o</span>
			</div>
			</div>
		</header>

		<main class="main">
			<aside class="sidebar">
			<div class="sidebar-section">
				<div class="sidebar-title">Sessions</div>
				<div class="sidebar-item active" data-session="default">
					Default
				</div>
			</div>
			<div class="sidebar-section">
				<div class="sidebar-title">Providers</div>
				<div class="sidebar-item">
					<span>🔵</span> OpenAI
				</div>
				<div class="sidebar-item">
					<span>🟠</span> Anthropic
				</div>
				<div class="sidebar-item">
					<span>💻</span> Local
				</div>
			</div>
			<div class="sidebar-section">
				<div class="sidebar-title">Settings</div>
				<div class="sidebar-item">
					⚙️ Configuration
				</div>
				<div class="sidebar-item">
					🔑 Authentication
				</div>
			</div>
			</aside>

			<div class="chat-container">
			<div class="messages" id="messages">
				<div class="empty-state">
					<div class="empty-icon">💬</div>
					<div class="empty-title">Start a conversation</div>
					<div class="empty-description">Send a message to begin chatting with Mortis</div>
				</div>
			</div>
			<div class="input-container">
				<div class="input-wrapper">
				<textarea id="message-input" placeholder="Type your message..." rows="1"></textarea>
				<button class="send-button" id="send-button" disabled>Send</button>
				</div>
			</div>
			</div>
		</main>
	</div>

	<script src="/assets/app.js"></script>
</body>
</html>
